experiment_name: camel-terminal_agent-grpo-test-synthdata
trial_name: config_test_tasks_qwen3-8b_synthdata_1-400

seed: 1
total_train_epochs: 2
tokenizer_path: ${actor.path}
async_training: true
enable_offload: false
max_workers: 45

n_trajs: 8
max_tokens_per_trajectory: 28672  # 6k tokens left some room for new tokens
max_iteration: 20
non_think_mode: true
task_timeouts:
  _reset_env: 600
  _reset_agent: 300
  agent_astep: 600
  _evaluate_completion_sync: 600
  _cleanup: null

cluster:
  n_nodes: 1
  n_gpus_per_node: 4
  fileroot: outputs/areal/experiments
  name_resolve:
    type: nfs
    nfs_record_root: outputs/areal/name_resolve

allocation_mode: sglang:d1p1t1

rollout:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  max_concurrent_rollouts: 4
  queue_size: 32
  consumer_batch_size: ${train_dataset.batch_size}
  max_head_offpolicyness: 2
  enable_rollout_tracing: true
  check_trajectory_format: true

gconfig:
  n_samples: 1
  min_new_tokens: 0
  max_new_tokens: 4096
  greedy: false
  temperature: 1.0

actor:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: Qwen/Qwen3-8B
  init_from_scratch: false
  disable_dropout: true
  gradient_checkpointing: false
  dtype: bfloat16
  mb_spec:
    max_tokens_per_mb: 32768
  optimizer:
    type: sgd
    lr: 1.70e-5
    weight_decay: 0.017
    # beta1: 0.9
    # beta2: 0.999
    eps: 1e-8
    lr_scheduler_type: constant
    gradient_clipping: 1.0
    warmup_steps_proportion: 0.001
  # backend: fsdp
  group_size: 1
  eps_clip: 0.4
  temperature: ${gconfig.temperature}
  reward_scaling: 10.0
  reward_bias: -0.5
  kl_ctl: 0.0
  ppo_n_minibatches: 1
  recompute_logprob: true
  use_decoupled_loss: true
  behav_imp_weight_cap: 5.0
  dynamic_sampling: false
  adv_norm:
    mean_level: batch
    std_level: batch
  max_new_tokens: ${gconfig.max_new_tokens}

ref:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  path: ${actor.path}
  init_from_scratch: false
  disable_dropout: true
  dtype: ${actor.dtype}
  mb_spec:
    max_tokens_per_mb: 10240
  optimizer: null
  # backend: fsdp

# SGLang
sglang:
  model_path: ${actor.path}
  random_seed: ${seed}
  skip_tokenizer_init: true
  dtype: ${actor.dtype}
  max_running_requests: null
  context_length: 32768
  mem_fraction_static: 0.8
  disable_radix_cache: true
  attention_backend: flashinfer

# datasets
train_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: synth_data_convert/train.parquet
  type: rl
  max_length: 1024

valid_dataset:
  batch_size: 16
  shuffle: true
  pin_memory: true
  num_workers: 4
  path: tbench-tasks_convert/val.parquet
  type: rl

# Utilities
saver:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

recover:
  mode: disabled
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: 3600

evaluator:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  freq_epochs: 1
  freq_steps: null
  freq_secs: null

stats_logger:
  experiment_name: ${experiment_name}
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}
  wandb:
    mode: online  # 'online', 'offline', 'shared', 'disabled', 'dryrun' or 'run'
  tensorboard:
    path: ${cluster.fileroot}/${experiment_name}/${trial_name}/tensorboard

launcher:
  inference_server_cpus_per_gpu: 4
  inference_server_mem_per_gpu: 32768
  trainer_cpus_per_gpu: 4
  trainer_mem_per_gpu: 32768

perf_tracer:
  enabled: true
  experiment_name: ${experiment_name}  # Reuse top-level metadata
  trial_name: ${trial_name}
  fileroot: ${cluster.fileroot}        # Shared filesystem path
  save_interval: 1                     # Write traces every step
  session_tracer:
    enabled: true                      # Track per-session lifecycle
    flush_threshold: 0               # Buffer 100 sessions before flushing